name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Missing repo secrets are ""; fallbacks keep unit tests / build / server boot valid.
    # E2E still needs real secrets + DB user for login/API to succeed.
    env:
      NODE_ENV: test
      APP_URL: http://127.0.0.1:3100
      AUTH_COOKIE_NAME: mtxos_session
      AUTH_JWT_SECRET: ${{ secrets.AUTH_JWT_SECRET || 'ci-placeholder-auth-jwt-secret-20' }}
      AUTH_SESSION_DAYS: 14
      DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://ci:ci@127.0.0.1:5432/ci_placeholder' }}
      E2E_EMAIL: ${{ secrets.E2E_EMAIL }}
      E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      SEED_OWNER_EMAIL: ${{ secrets.E2E_EMAIL }}
      SEED_OWNER_PASSWORD: ${{ secrets.E2E_PASSWORD }}
      CRON_SECRET: ${{ secrets.CRON_SECRET || 'ci-placeholder-cron-secret-16' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Dependency audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build app
        run: npm run build

      - name: E2E smoke
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
